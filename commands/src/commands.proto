syntax = "proto3";
package messages;

message HorustMsgMessage {
  oneof message_type {
    HorustMsgRequest request = 1;
    HorustMsgResponse response = 2;
  }
}
message HorustMsgRequest {
  oneof request {
    HorustMsgServiceStatusRequest status_request = 1;
    HorustMsgServiceChangeRequest change_request = 2;
    HorustMsgRestartRequest restart_request = 3;
    HorustMsgReloadRequest reload_request = 4;
    HorustMsgAllServicesStatusRequest all_status_request = 5;
  }
}
message HorustMsgResponse {
  oneof response {
    HorustMsgError error = 1;
    HorustMsgServiceStatusResponse status_response = 2;
    HorustMsgServiceChangeResponse change_response = 3;
    HorustMsgRestartResponse restart_response = 4;
    HorustMsgReloadResponse reload_response = 5;
    HorustMsgAllServicesStatusResponse all_status_response = 6;
  }
}

message HorustMsgError {
  string error_string = 1;
}

message HorustMsgServiceStatusRequest {
  string service_name = 1;
}

message HorustMsgServiceStatusResponse {
  string service_name = 1;
  HorustMsgServiceStatus service_status = 2;
}

message HorustMsgServiceChangeRequest {
  string service_name = 1;
  HorustMsgServiceStatus service_status = 2;
}

// Acknowledgment response for change requests.
message HorustMsgServiceChangeResponse {
  string service_name = 1;
  bool accepted = 2;
}

message HorustMsgRestartRequest {
  string service_name = 1;
}

// Acknowledgment response for restart requests.
message HorustMsgRestartResponse {
  string service_name = 1;
  bool accepted = 2;
}

// Reload service directories for new service definitions.
message HorustMsgReloadRequest {
}

message HorustMsgReloadResponse {
  bool accepted = 1;
  repeated string new_services = 2;
}

// Request status of all services.
message HorustMsgAllServicesStatusRequest {
}

message HorustMsgServiceStatusEntry {
  string service_name = 1;
  HorustMsgServiceStatus service_status = 2;
}

message HorustMsgAllServicesStatusResponse {
  repeated HorustMsgServiceStatusEntry services = 1;
}

enum HorustMsgServiceStatus {
  STARTING = 0;
  STARTED = 1;
  RUNNING = 2;
  INKILLING = 3;
  SUCCESS = 4;
  FINISHED = 5;
  FINISHEDFAILED = 6;
  FAILED = 7;
  INITIAL = 8;
}
